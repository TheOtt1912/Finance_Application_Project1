{% extends 'base.html' %}

{% block title %}Add Transaction{% endblock %}

{% block content %}
<div class="form-container">
  <form method="post">

    <div class="form-group">
      <label for="contact_id">Contact</label>
      <input type="text" id="contact-search" placeholder="Search contacts..." oninput="filterContacts(this.value)">
      <select id="contact_id" name="contact_id" size="5" required>
        {% for contact in contacts %}
          <option value="{{ contact['id'] }}">{{ contact['id'] }} — {{ contact['name'] }}</option>
        {% endfor %}
      </select>
    </div>

    <div class="form-group">
      <label for="amount">Amount</label>
      <input type="number" id="amount" name="amount" placeholder="0.00" step="0.01" required>
    </div>

    <div class="form-group">
      <label for="who_owes">Who owes?</label>
      <select id="who_owes" name="who_owes" required>
        <option value="" disabled selected>Select...</option>
        <option value="0">They owe me</option>
        <option value="1">I owe them</option>
      </select>
    </div>

    <button type="submit">Add Transaction</button>

  </form>
</div>

<script>
  function filterContacts(query) {
    const select = document.getElementById('contact_id');
    const options = select.querySelectorAll('option');
    options.forEach(option => {
      const match = option.textContent.toLowerCase().includes(query.toLowerCase());
      option.style.display = match ? '' : 'none';
    });
  }
</script>
{% endblock %}
